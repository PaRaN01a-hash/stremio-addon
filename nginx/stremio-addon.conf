# nginx/stremio-addon.conf
# Drop this in your NPM (Nginx Proxy Manager) custom config,
# or use as a standalone NGINX server block.

server {
    listen 80;
    server_name addon.yourdomain.com;  # Replace with your domain

    # Redirect to HTTPS (NPM handles this automatically if you use it)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name addon.yourdomain.com;  # Replace with your domain

    # SSL — managed by NPM / Certbot (paths shown for reference)
    # ssl_certificate /etc/letsencrypt/live/addon.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/addon.yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # CORS — required for Stremio/Nuvio to load the manifest
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important: don't buffer stream responses
        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Cache manifest aggressively at NGINX level
    location = /manifest.json {
        proxy_pass http://127.0.0.1:7000;
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # Health check — don't log these
    location = /health {
        proxy_pass http://127.0.0.1:7000;
        access_log off;
    }
}
